version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: apt-early-detection:latest
    container_name: apt_api
    ports:
      - "8000:8000"
    volumes:
      # mount models directory so re-training outside docker is picked up
      - ./models:/app/models:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: apt_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: apt_network
