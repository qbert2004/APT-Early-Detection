version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: apt-early-detection:latest
    container_name: apt_api
    ports:
      - "8000:8000"
    volumes:
      # mount models directory so re-training outside docker is picked up
      - ./models:/app/models:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  dashboard:
    image: python:3.12-slim
    container_name: apt_dashboard
    working_dir: /app
    command: >
      sh -c "pip install -q streamlit==1.55.0 plotly==6.6.0 pandas==2.3.3 numpy==2.3.5
             matplotlib==3.10.8 scikit-learn==1.8.0 joblib==1.5.3 shap==0.50.0 &&
             streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    volumes:
      - .:/app:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: apt_network
